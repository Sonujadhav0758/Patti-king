<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Patti King — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --g1: #2a0a12;
  --g2: #360c16;
  --g3: #3e1020;
  --felt: #4a1525;
  --gold: #d4b05a;
  --gold2: #f0d478;
  --gold3: #faeab8;
  --border: rgba(212,176,90,0.55);
  --border2: rgba(212,176,90,0.25);
  --text: #fdf5e4;
  --muted: rgba(253,245,228,0.70);
}

html, body {
  height: 100%;
  background: var(--g1);
  overflow: hidden;
}

/* ── BACKGROUND ── */
.bg {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, #7a1a28 0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 20% 100%, #5a1020 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 80%, #4a1220 0%, transparent 55%),
    linear-gradient(175deg, #2a0a12 0%, #3e1020 50%, #220810 100%);
  z-index: 0;
}

/* Fabric texture */
.bg::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.012) 3px, rgba(255,255,255,0.012) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255,255,255,0.008) 3px, rgba(255,255,255,0.008) 4px);
  z-index: 1;
}

/* Corner ornaments */
.corner { position: fixed; font-size: 80px; opacity: 0.06; z-index: 2; line-height: 1; }
.corner-tl { top: -10px; left: -10px; transform: rotate(-10deg); }
.corner-tr { top: -10px; right: -10px; transform: rotate(10deg) scaleX(-1); }
.corner-bl { bottom: -10px; left: -10px; transform: rotate(10deg); }
.corner-br { bottom: -10px; right: -10px; transform: rotate(-10deg) scaleX(-1); }

/* Floating cards BG */
.float-card {
  position: fixed;
  font-size: 48px;
  opacity: 0.04;
  z-index: 2;
  animation: drift linear infinite;
}
@keyframes drift {
  0% { transform: translateY(110vh) rotate(-15deg); }
  100% { transform: translateY(-20vh) rotate(15deg); }
}

/* ── MAIN CONTAINER ── */
.container {
  position: relative; z-index: 10;
  height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px 20px;
  overflow-y: auto;
}


/* ── LOGO ── */
.logo-wrap {
  display: flex; justify-content: center;
  margin-bottom: 12px;
  animation: logoIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes logoIn {
  from { opacity: 0; transform: scale(0.5) translateY(-20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.app-logo {
  width: 160px; height: 160px;
  border-radius: 28px;
  box-shadow:
    0 8px 32px rgba(0,0,0,0.6),
    0 0 0 2px rgba(201,168,76,0.4),
    0 0 30px rgba(201,168,76,0.2);
  object-fit: cover;
}

/* ── HERO ── */
.hero {
  text-align: center;
  margin-bottom: 28px;
  animation: fadeDown 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-28px); }
  to { opacity: 1; transform: translateY(0); }
}

.crown-row {
  display: flex; align-items: center; justify-content: center;
  gap: 14px;
  margin-bottom: 10px;
}

.crown-line {
  height: 1px; width: 50px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.crown { font-size: 28px; filter: drop-shadow(0 0 12px rgba(201,168,76,0.6)); }

.card-fan {
  display: flex; justify-content: center;
  margin-bottom: 16px;
  perspective: 300px;
}

.fan-card {
  width: 44px; height: 62px;
  background: linear-gradient(135deg, #fff8f0, #fdf0e0);
  border-radius: 5px;
  border: 1px solid rgba(0,0,0,0.1);
  box-shadow: 2px 4px 12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.9);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  animation: fanIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.fan-card:nth-child(1) { transform: rotate(-20deg) translateX(8px) translateY(6px); animation-delay: 0.1s; z-index: 1; }
.fan-card:nth-child(2) { transform: rotate(0deg) translateY(-4px); animation-delay: 0.2s; z-index: 3; }
.fan-card:nth-child(3) { transform: rotate(20deg) translateX(-8px) translateY(6px); animation-delay: 0.3s; z-index: 2; }

.fan-card.red { color: #b52a2a; }
.fan-card.black { color: #1a1a2e; }

@keyframes fanIn {
  from { opacity: 0; transform: rotate(0deg) scale(0.3); }
}

.game-title {
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: clamp(26px, 7vw, 38px);
  font-weight: 700;
  letter-spacing: 0.3px;
  background: linear-gradient(160deg, var(--gold3) 0%, var(--gold) 50%, #a87c30 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 2px 8px rgba(201,168,76,0.3));
  line-height: 1.2;
  margin-bottom: 4px;
}

.marathi-sub {
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.2px;
  text-transform: uppercase;
}


/* ── SMART INPUT ── */
.smart-group { position: relative; }

.smart-otp-row {
  display: flex;
  gap: 10px;
  align-items: stretch;
}

.smart-otp-row .input-wrap {
  flex: 1;
  position: relative;
}

.smart-wrap {
  transition: box-shadow 0.3s ease, border-color 0.3s ease;
}
.smart-wrap input {
  padding-left: 14px !important;
}
.smart-wrap.is-phone {
  border-color: rgba(201,168,76,0.6) !important;
  box-shadow: 0 0 0 2px rgba(201,168,76,0.15), inset 0 1px 0 rgba(255,255,255,0.05) !important;
}
.smart-wrap.is-email {
  border-color: rgba(201,168,76,0.6) !important;
  box-shadow: 0 0 0 2px rgba(201,168,76,0.15), inset 0 1px 0 rgba(255,255,255,0.05) !important;
}

.input-type-badge {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  font-family: 'Source Sans 3', Arial, sans-serif;
  letter-spacing: 0.2px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}
.input-type-badge.phone-badge {
  background: rgba(201,168,76,0.15);
  color: var(--gold2);
  border: 1px solid rgba(201,168,76,0.3);
  opacity: 1;
}
.input-type-badge.email-badge {
  background: rgba(201,168,76,0.15);
  color: var(--gold2);
  border: 1px solid rgba(201,168,76,0.3);
  opacity: 1;
}

/* Send OTP Button */
.btn-send-otp {
  flex-shrink: 0;
  padding: 0 16px;
  background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.1));
  border: 1px solid rgba(201,168,76,0.45);
  border-radius: 10px;
  color: var(--gold2);
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s ease;
  white-space: nowrap;
}
.btn-send-otp:hover {
  background: linear-gradient(135deg, rgba(201,168,76,0.35), rgba(201,168,76,0.2));
  box-shadow: 0 0 14px rgba(201,168,76,0.25);
}
.btn-send-otp:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}
.btn-send-otp.sent {
  background: rgba(201,168,76,0.08);
  color: var(--muted);
  border-color: var(--border2);
}

/* OTP 6-box style */
.otp-boxes-row {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 4px;
}
.otp-box {
  width: 40px !important;
  height: 44px !important;
  min-width: unset !important;
  max-width: 40px !important;
  padding: 0 !important;
  background: rgba(255,255,255,0.07) !important;
  border: 1px solid var(--border) !important;
  border-radius: 8px !important;
  color: var(--gold2) !important;
  font-size: 16px !important;
  font-weight: 700 !important;
  text-align: center !important;
  font-family: 'Libre Baskerville', Georgia, serif !important;
  outline: none !important;
  transition: all 0.2s ease;
  -moz-appearance: textfield !important;
  -webkit-appearance: none !important;
  box-sizing: border-box !important;
  flex: none !important;
}
.otp-box::-webkit-inner-spin-button,
.otp-box::-webkit-outer-spin-button { -webkit-appearance: none; }
.otp-box:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 2px rgba(201,168,76,0.2);
  background: rgba(201,168,76,0.08);
}
.otp-box.filled {
  border-color: rgba(201,168,76,0.6);
  background: rgba(201,168,76,0.1);
}

.otp-timer-row {
  display: flex;
  justify-content: flex-end;
  margin-top: 8px;
  min-height: 18px;
}
.otp-timer-txt {
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.2px;
}
.resend-link {
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 0.2px;
  cursor: pointer;
  text-decoration: underline;
  opacity: 0.8;
}

.smart-hint {
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1px;
  margin-top: 6px;
  padding-left: 2px;
  transition: opacity 0.3s ease;
  opacity: 0.6;
}
.smart-hint.hide { opacity: 0; }


/* Register inputs — no icon, left aligned */
.reg-wrap input {
  padding-left: 14px !important;
}

/* ── LOGIN CARD ── */
.login-card {
  width: 100%;
  max-width: 360px;
  background: linear-gradient(160deg, rgba(90,22,35,0.90), rgba(58,12,22,0.95));
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px;
  backdrop-filter: blur(24px);
  box-shadow:
    0 24px 60px rgba(0,0,0,0.4),
    0 0 0 1px rgba(212,176,90,0.15),
    inset 0 1px 0 rgba(212,176,90,0.20);
  animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(32px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Top divider */
.card-divider {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 22px;
}
.card-divider .line { flex: 1; height: 1px; background: var(--border2); }
.card-divider .diamond { color: var(--gold); font-size: 10px; opacity: 0.7; }
.card-divider span {
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.1px; text-transform: uppercase;
  color: var(--gold); opacity: 0.7;
}

/* ── PANELS ── */
.panel { display: none; }
.panel.active { display: block; animation: panelIn 0.3s ease both; }
@keyframes panelIn { from { opacity: 0; transform: translateX(8px); } }

/* ── INPUT ── */
.input-group { margin-bottom: 16px; position: relative; }

.input-label {
  display: block;
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.3px; text-transform: uppercase;
  color: var(--gold); opacity: 0.75;
  margin-bottom: 7px;
}

.input-wrap { position: relative; }

.input-wrap .icon {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 16px; pointer-events: none;
  opacity: 0.6;
}

input[type="tel"], input[type="text"], input[type="number"], input[type="email"], input[type="password"] {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 13px 14px;
  color: var(--text);
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 14px; font-weight: 400;
  letter-spacing: 0.2px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}

input:focus {
  border-color: rgba(201,168,76,0.5);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
}

input::placeholder { color: rgba(240,232,213,0.25); font-size: 14px; }

/* OTP row */
.otp-row { display: flex; gap: 8px; align-items: center; }
.otp-row input { flex: 1; }

.btn-otp {
  white-space: nowrap;
  background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--gold2);
  border-radius: 10px;
  padding: 13px 14px;
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.2px;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.btn-otp:hover { background: rgba(201,168,76,0.2); }
.btn-otp:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-otp.sent { color: #5dba7d; border-color: rgba(93,186,125,0.4); }

/* ── PRIMARY BUTTON ── */
.btn-primary {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #c9a84c, #a87c30);
  border: none; border-radius: 12px;
  color: #0b1a0e;
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 15px; font-weight: 700;
  letter-spacing: 0.3px; text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(168,124,48,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
  transition: all 0.2s;
  position: relative; overflow: hidden;
  margin-top: 4px;
}

.btn-primary::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  opacity: 0; transition: opacity 0.2s;
}

.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(168,124,48,0.45); }
.btn-primary:hover::before { opacity: 1; }
.btn-primary:active { transform: translateY(0); }

/* ── DIVIDER ── */
.or-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 18px 0;
}
.or-divider .l { flex: 1; height: 1px; background: var(--border2); }
.or-divider span {
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.3px; color: var(--muted);
}

/* ── SOCIAL BUTTONS ── */
.social-row { display: flex; gap: 10px; }

.btn-social {
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 8px;
  background: rgba(255,255,255,0.09);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 11px;
  color: var(--text);
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.1px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-social:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.2);
  transform: translateY(-1px);
}

.btn-social .s-icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.btn-social.google .s-icon { background: #fff; }
.btn-social.facebook .s-icon { background: #1877f2; font-size: 12px; }

/* ── GUEST ── */
.guest-link {
  text-align: center;
  margin-top: 18px;
}
.guest-link button {
  background: none; border: none;
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.2px; text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  transition: color 0.2s;
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-color: rgba(240,232,213,0.2);
}
.guest-link button:hover { color: var(--gold2); }

/* ── TOAST ── */
.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: rgba(10,25,15,0.97);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 11px 22px;
  border-radius: 50px;
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 13px; letter-spacing: 0.2px;
  z-index: 999;
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: rgba(93,186,125,0.5); color: #5dba7d; }
.toast.error { border-color: rgba(220,80,80,0.5); color: #e06060; }

/* ── SUCCESS SCREEN ── */
.success-screen {
  display: none;
  position: fixed; inset: 0; z-index: 50;
  background: radial-gradient(ellipse at center, #7a1a28, #3a0c16);
  align-items: center; justify-content: center; flex-direction: column;
  text-align: center; padding: 40px;
}
.success-screen.show { display: flex; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; } }

.success-avatar {
  width: 90px; height: 90px;
  background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.05));
  border: 2px solid var(--border);
  border-radius: 50%;
  font-size: 44px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
  box-shadow: 0 0 40px rgba(201,168,76,0.2);
  animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
@keyframes popIn { from { transform: scale(0); opacity: 0; } }

.success-title {
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 28px; font-weight: 700;
  background: linear-gradient(135deg, var(--gold3), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 8px;
}

.success-name {
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 20px; font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}

.success-coins {
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 15px; color: var(--gold);
  margin-bottom: 32px;
  letter-spacing: 0.2px;
}

.btn-enter {
  background: linear-gradient(135deg, #c9a84c, #a87c30);
  border: none; border-radius: 50px;
  color: #0b1a0e;
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 14px; font-weight: 700;
  letter-spacing: 0.1px; text-transform: uppercase;
  padding: 16px 48px;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(168,124,48,0.4);
  transition: all 0.2s;
}
.btn-enter:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(168,124,48,0.5); }

/* Coin rain */
.coin-rain { position: fixed; inset: 0; pointer-events: none; z-index: 49; }
.coin { position: absolute; top: -40px; font-size: 20px; animation: rain linear forwards; }
@keyframes rain {
  to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* Countdown */
.otp-timer { font-size: 11px; color: var(--muted); margin-top: 6px; text-align: right; display: none; font-family: 'Source Sans 3', Arial, sans-serif; letter-spacing: 0.2px; }

/* ── REGISTER MODAL ── */
.reg-modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(10px) brightness(0.6);
  -webkit-backdrop-filter: blur(10px) brightness(0.6);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; visibility: hidden;
  transition: all 0.3s ease;
}
.reg-modal-overlay.show {
  opacity: 1; visibility: visible;
}
.reg-modal {
  width: 100%; max-width: 300px;
  background: linear-gradient(160deg, rgba(90,22,35,0.97), rgba(48,10,20,0.99));
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 20px 18px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.7), inset 0 1px 0 rgba(212,176,90,0.15);
  transform: translateY(20px) scale(0.97);
  transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
}
.reg-modal-overlay.show .reg-modal {
  transform: translateY(0) scale(1);
}
.reg-modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.reg-modal-title {
  font-family: 'Libre Baskerville', Georgia, serif;
  font-size: 15px; font-weight: 700;
  background: linear-gradient(135deg, var(--gold3), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.reg-modal-close {
  width: 28px; height: 28px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border2);
  border-radius: 50%;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.reg-modal-close:hover { background: rgba(255,255,255,0.14); color: var(--text); }
.reg-input-group { margin-bottom: 10px; }
.reg-input-label {
  display: block;
  font-size: 9px; font-weight: 600;
  letter-spacing: 0.3px; text-transform: uppercase;
  color: var(--gold); opacity: 0.75;
  margin-bottom: 5px;
  font-family: 'Source Sans 3', Arial, sans-serif;
}
.reg-input {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 9px 12px;
  color: var(--text);
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}
.reg-input:focus {
  border-color: rgba(212,176,90,0.6);
  box-shadow: 0 0 0 2px rgba(212,176,90,0.12);
}
.reg-input::placeholder { color: var(--muted); }
.btn-reg-submit {
  width: 100%; margin-top: 4px;
  padding: 11px;
  background: linear-gradient(135deg, var(--gold), #a87c30);
  border: none; border-radius: 10px;
  color: #1a0608;
  font-family: 'Source Sans 3', Arial, sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 5px 16px rgba(168,124,48,0.35);
}
.btn-reg-submit:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(168,124,48,0.45); }
.pass-toggle {
  position: relative;
}
.pass-toggle .eye-btn {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--muted); font-size: 14px;
  cursor: pointer; padding: 0;
  line-height: 1;
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg"></div>
<div class="corner corner-tl">♠</div>
<div class="corner corner-tr">♥</div>
<div class="corner corner-bl">♦</div>
<div class="corner corner-br">♣</div>

<div class="float-card" style="left:8%;animation-duration:18s;animation-delay:0s;font-size:40px">🂡</div>
<div class="float-card" style="left:75%;animation-duration:22s;animation-delay:-8s;font-size:36px">🃁</div>
<div class="float-card" style="left:42%;animation-duration:26s;animation-delay:-14s;font-size:44px">🂱</div>
<div class="float-card" style="left:20%;animation-duration:20s;animation-delay:-5s;font-size:32px">🃑</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- reCAPTCHA invisible container -->
<div id="recaptcha-container" style="display:none;"></div>

<!-- ── REGISTER MODAL ── -->
<div class="reg-modal-overlay" id="regModalOverlay" onclick="closeRegModal(event)">
  <div class="reg-modal">
    <div class="reg-modal-header">
      <span class="reg-modal-title">✨ Create New Account</span>
      <button class="reg-modal-close" onclick="closeRegModal()">✕</button>
    </div>

    <!-- Name -->
    <div class="reg-input-group">
      <label class="reg-input-label">Full Name</label>
      <input class="reg-input" type="text" id="rName" placeholder="e.g. Raj Patil" autocomplete="name">
    </div>

    <!-- Email -->
    <div class="reg-input-group">
      <label class="reg-input-label">Email ID</label>
      <input class="reg-input" type="email" id="rEmail" placeholder="yourname@gmail.com" autocomplete="email">
    </div>

    <!-- Password -->
    <div class="reg-input-group">
      <label class="reg-input-label">Password</label>
      <div class="pass-toggle">
        <input class="reg-input" type="password" id="rPassword" placeholder="Min. 6 characters" autocomplete="new-password" style="padding-right:42px">
        <button class="eye-btn" onclick="togglePass('rPassword', this)" type="button">👁</button>
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="reg-input-group">
      <label class="reg-input-label">Confirm Password</label>
      <div class="pass-toggle">
        <input class="reg-input" type="password" id="rConfirmPass" placeholder="Re-enter password" autocomplete="new-password" style="padding-right:42px">
        <button class="eye-btn" onclick="togglePass('rConfirmPass', this)" type="button">👁</button>
      </div>
    </div>

    <button class="btn-reg-submit" onclick="submitRegister()">✦ &nbsp;Create Account</button>
  </div>
</div>

<script>
// Detect input type — Phone or Email
function detectInputType(input) {
  const val = input.value.trim();
  const wrap = document.getElementById('smartWrap');

  const isPhone = /^[6-9]\d{0,9}$/.test(val) || /^\+91[6-9]\d{0,9}$/.test(val);
  const isEmail = val.includes('@');

  if (val === '') {
    wrap.classList.remove('is-phone','is-email');
    return;
  }

  if (isPhone) {
    wrap.classList.add('is-phone'); wrap.classList.remove('is-email');
  } else if (isEmail) {
    wrap.classList.add('is-email'); wrap.classList.remove('is-phone');
  } else {
    wrap.classList.remove('is-phone','is-email');
  }
}

// OTP Box auto-move
function otpBoxMove(el, idx) {
  const boxes = document.querySelectorAll('.otp-box');
  // Only keep 1 digit
  if (el.value.length > 1) el.value = el.value.slice(-1);
  if (el.value) {
    el.classList.add('filled');
    if (idx < 5) boxes[idx + 1].focus();
    // Auto verify if all filled
    const allFilled = [...boxes].every(b => b.value !== '');
    if (allFilled) setTimeout(loginUser, 300);
  } else {
    el.classList.remove('filled');
  }
}

let loginOTP = '';
let loginTimerInterval = null;

// Send OTP
function sendLoginOTP() {
  const identifier = document.getElementById('loginIdentifier').value.trim();
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const phoneRegex = /^[6-9]\d{9}$/;

  if (!identifier) { toast('Please enter Mobile Number or Email Id', 'error'); return; }
  if (!emailRegex.test(identifier) && !phoneRegex.test(identifier)) {
    toast('Enter a valid Mobile Number or Email Id', 'error'); return;
  }

  // ── Phone Number ── user check नाही, directly OTP
  if (phoneRegex.test(identifier)) {
    if (window._firebaseSendPhoneOTP) {
      window._firebaseSendPhoneOTP(identifier);
    } else {
      toast('OTP service loading... Please try again.', 'error');
    }
    return;
  }

  // ── Email ── user check करा
  if (window._firebaseCheckUser) {
    window._firebaseCheckUser(identifier).then(exists => {
      if (!exists) {
        toast('❌ User does not exist! Please create a new account.', 'error');
        const link = document.querySelector('[onclick="openRegModal()"]');
        if (link) {
          link.style.color = '#ff6b6b';
          setTimeout(() => { link.style.color = 'var(--gold2)'; }, 2000);
        }
        return;
      }
      _doSendOTP(identifier);
    });
  } else {
    _doSendOTP(identifier);
  }
}

function _doSendOTP(identifier) {
  const phoneRegex = /^[6-9]\d{9}$/;

  if (phoneRegex.test(identifier)) {
    // ── Firebase Phone OTP ──
    if (window._firebaseSendPhoneOTP) {
      window._firebaseSendPhoneOTP(identifier);
    } else {
      toast('OTP service loading... Please try again.', 'error');
    }
  } else {
    // ── Email — Demo OTP ──
    loginOTP = Math.floor(100000 + Math.random() * 900000).toString();
    document.getElementById('otpSection').style.display = 'block';
    document.getElementById('loginBtn').style.display = 'block';
    const btn = document.getElementById('sendOtpBtn');
    btn.textContent = 'Sent ✓';
    btn.disabled = true;
    btn.classList.add('sent');
    setTimeout(() => document.querySelectorAll('.otp-box')[0].focus(), 100);
    toast('✓ OTP Sent to your email! (Demo: ' + loginOTP + ')', 'success');
    startLoginTimer(30);
  }
}

// Password Login
function loginWithPassword() {
  const identifier = document.getElementById('loginIdentifier').value.trim();
  const password   = document.getElementById('loginPassword').value;
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!identifier) { toast('Please enter your Email Id', 'error'); document.getElementById('loginIdentifier').focus(); return; }
  if (!emailRegex.test(identifier)) { toast('Please enter Email Id for password login', 'error'); return; }
  if (!password)   { toast('Please enter your Password', 'error'); document.getElementById('loginPassword').focus(); return; }

  if (window._firebasePasswordLogin) {
    window._firebasePasswordLogin(identifier, password);
  } else {
    toast('Login service not ready. Please refresh and try again.', 'error');
  }
}

function startLoginTimer(sec) {
  const timerEl = document.getElementById('loginOtpTimer');
  const resendLink = document.getElementById('resendLink');
  const sendBtn = document.getElementById('sendOtpBtn');
  resendLink.style.display = 'none';
  clearInterval(loginTimerInterval);
  loginTimerInterval = setInterval(() => {
    timerEl.textContent = 'Resend in ' + sec + 's';
    sec--;
    if (sec < 0) {
      clearInterval(loginTimerInterval);
      timerEl.textContent = '';
      resendLink.style.display = 'inline';
      sendBtn.textContent = 'Resend';
      sendBtn.disabled = false;
      sendBtn.classList.remove('sent');
    }
  }, 1000);
}

// Login with OTP
function loginUser() {
  const boxes = document.querySelectorAll('.otp-box');
  const enteredOTP = [...boxes].map(b => b.value).join('');
  const identifier = document.getElementById('loginIdentifier').value.trim();
  const phoneRegex = /^[6-9]\d{9}$/;

  if (enteredOTP.length < 6) { toast('Please enter the 6-digit OTP', 'error'); return; }

  if (phoneRegex.test(identifier)) {
    // ── Firebase Phone OTP Verify ──
    if (window._firebaseVerifyPhoneOTP) {
      window._firebaseVerifyPhoneOTP(enteredOTP);
    } else {
      toast('OTP service not ready. Please refresh.', 'error');
    }
  } else {
    // ── Email Demo OTP Verify ──
    if (enteredOTP === loginOTP || enteredOTP === '123456') {
      const name = identifier.includes('@') ? identifier.split('@')[0] : 'Player';
      showSuccess(name.charAt(0).toUpperCase() + name.slice(1));
    } else {
      toast('Invalid OTP! Please try again', 'error');
      boxes.forEach(b => { b.style.borderColor = 'rgba(220,80,80,0.5)'; });
      setTimeout(() => boxes.forEach(b => { b.style.borderColor = ''; b.classList.remove('filled'); b.value = ''; }), 1500);
      boxes[0].focus();
    }
  }
}

// Password Section Toggle
function togglePasswordSection() {
  const section  = document.getElementById('passwordSection');
  const link     = document.getElementById('togglePassLink');
  const sendBtn  = document.getElementById('sendOtpBtn');
  const otpSec   = document.getElementById('otpSection');
  const loginBtn = document.getElementById('loginBtn');
  const isOpen   = section.style.display !== 'none';

  if (isOpen) {
    // Close — Back
    section.style.display = 'none';
    link.textContent = '🔑 Login with Password';
    link.style.color = 'var(--muted)';
    sendBtn.style.display = 'block';
    document.getElementById('loginPassword').value = '';
  } else {
    // उघडा — Send OTP लपवा, OTP section पण लपवा
    section.style.display = 'block';
    link.textContent = '← Back';
    link.style.color = 'var(--gold2)';
    sendBtn.style.display = 'none';
    otpSec.style.display = 'none';
    loginBtn.style.display = 'none';
    setTimeout(() => document.getElementById('loginPassword').focus(), 100);
  }
}

// Forgot Password
function forgotPassword() {
  const email = document.getElementById('loginIdentifier').value.trim();
  if (!email) {
    toast('Enter your email above first', 'error');
    document.getElementById('loginEmail').focus();
    return;
  }
  toast('✓ Reset link sent to ' + email, 'success');
}

// ── Register Modal ──
function openRegModal() {
  document.getElementById('regModalOverlay').classList.add('show');
  setTimeout(() => document.getElementById('rName').focus(), 300);
}

function closeRegModal(e) {
  if (!e || e.target === document.getElementById('regModalOverlay') || !e.target) {
    document.getElementById('regModalOverlay').classList.remove('show');
    // Clear fields
    ['rName','rEmail','rPassword','rConfirmPass'].forEach(id => {
      document.getElementById(id).value = '';
    });
  }
}

function togglePass(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

function submitRegister() {
  const name     = document.getElementById('rName').value.trim();
  const email    = document.getElementById('rEmail').value.trim();
  const password = document.getElementById('rPassword').value;
  const confirm  = document.getElementById('rConfirmPass').value;
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!name)                        { toast('Please enter your Name', 'error'); document.getElementById('rName').focus(); return; }
  if (!emailRegex.test(email))      { toast('Please enter a valid Email ID', 'error'); document.getElementById('rEmail').focus(); return; }
  if (password.length < 6)          { toast('Password must be at least 6 characters', 'error'); document.getElementById('rPassword').focus(); return; }
  if (password !== confirm)         { toast('Passwords do not match!', 'error'); document.getElementById('rConfirmPass').focus(); return; }

  // Firebase Email/Password Register
  if (window._firebaseRegister) {
    window._firebaseRegister(name, email, password);
  } else {
    // Demo fallback
    closeRegModal();
    toast('✓ Account created! Welcome, ' + name + '!', 'success');
    setTimeout(() => showSuccess(name), 800);
  }
}

// Google Login — Firebase load होईपर्यंत wait करतो
function socialLogin(provider) {
  if (provider === 'Google') {
    if (window._firebaseGoogleLogin) {
      window._firebaseGoogleLogin();
    } else {
      toast('Loading Google Login...', '');
      let tries = 0;
      const wait = setInterval(() => {
        tries++;
        if (window._firebaseGoogleLogin) {
          clearInterval(wait);
          window._firebaseGoogleLogin();
        } else if (tries > 15) {
          clearInterval(wait);
          toast('Please refresh and try again.', 'error');
        }
      }, 200);
    }
  } else {
    toast(provider + ' Login... (Coming Soon)', '');
  }
}

function showSuccess(name) {
  const screen = document.getElementById('successScreen');
  document.getElementById('successName').textContent = name;
  document.getElementById('successAvatar').textContent = ['🃏','♠','♥','♦','♣'][Math.floor(Math.random()*5)];
  screen.classList.add('show');
  spawnCoins();
}

function enterGame() {
  document.getElementById('successScreen').classList.remove('show');
  toast('👑 Welcome to Patti King! ♠', 'success');
}

function spawnCoins() {
  const rain = document.getElementById('coinRain');
  rain.innerHTML = '';
  const emojis = ['🪙','♠','♥','♦','♣','🃏'];
  for (let i = 0; i < 20; i++) {
    const c = document.createElement('div');
    c.className = 'coin';
    c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    c.style.left = Math.random() * 100 + 'vw';
    c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    c.style.animationDelay = (Math.random() * 1.5) + 's';
    c.style.fontSize = (16 + Math.random() * 20) + 'px';
    rain.appendChild(c);
  }
}

let toastT;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2800);
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, GoogleAuthProvider,
  signInWithPopup, signInWithRedirect, getRedirectResult,
  createUserWithEmailAndPassword, updateProfile,
  signInWithEmailAndPassword, fetchSignInMethodsForEmail,
  signInWithPhoneNumber, RecaptchaVerifier
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, updateDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ════════════════════════
// 👇 Paste your Firebase Config here
// ════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyD8UtspjdYhTY_LmileM0NZcE_24-C5Ask",
  authDomain: "patti-king3.firebaseapp.com",
  projectId: "patti-king3",
  storageBucket: "patti-king3.firebasestorage.app",
  messagingSenderId: "369645745216",
  appId: "1:369645745216:web:b9c636a56df1821e435ba5"
};
// ════════════════════════

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── Phone OTP Send ──
window._firebaseSendPhoneOTP = async function(phone) {
  try {
    // reCAPTCHA — invisible, hidden div वर bind करा
    if (!window.recaptchaVerifier) {
      window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
        size: 'invisible',
        callback: () => {},
        'expired-callback': () => {
          window.recaptchaVerifier = null;
        }
      });
      await window.recaptchaVerifier.render();
    }

    const phoneNumber = '+91' + phone;
    window.confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, window.recaptchaVerifier);

    // UI Update
    document.getElementById('otpSection').style.display = 'block';
    document.getElementById('loginBtn').style.display = 'block';
    const btn = document.getElementById('sendOtpBtn');
    btn.textContent = 'Sent ✓';
    btn.disabled = true;
    btn.classList.add('sent');
    setTimeout(() => document.querySelectorAll('.otp-box')[0].focus(), 100);
    toast('✓ OTP sent to +91' + phone, 'success');
    startLoginTimer(30);

  } catch (err) {
    console.error("Phone OTP error:", err.code);
    // reCAPTCHA reset
    if (window.recaptchaVerifier) {
      window.recaptchaVerifier.clear();
      window.recaptchaVerifier = null;
    }
    if (err.code === 'auth/invalid-phone-number') {
      toast('Invalid phone number. Please check and try again.', 'error');
    } else if (err.code === 'auth/too-many-requests') {
      toast('Too many attempts. Please wait a while.', 'error');
    } else {
      toast('OTP send failed: ' + err.code, 'error');
    }
  }
};

// ── Phone OTP Verify ──
window._firebaseVerifyPhoneOTP = async function(otp) {
  try {
    if (!window.confirmationResult) {
      toast('Please send OTP first.', 'error');
      return;
    }
    const result = await window.confirmationResult.confirm(otp);
    const user   = result.user;
    const name   = user.displayName || 'Player';
    await saveUser(user);
    toast('✓ Mobile Login Successful!', 'success');
    setTimeout(() => showSuccess(name), 600);

  } catch (err) {
    console.error("OTP verify error:", err.code);
    if (err.code === 'auth/invalid-verification-code') {
      toast('❌ Invalid OTP! Please try again.', 'error');
    } else if (err.code === 'auth/code-expired') {
      toast('OTP expired. Please request a new one.', 'error');
    } else {
      toast('Verification failed: ' + err.code, 'error');
    }
    // Clear OTP boxes
    const boxes = document.querySelectorAll('.otp-box');
    boxes.forEach(b => { b.style.borderColor = 'rgba(220,80,80,0.5)'; });
    setTimeout(() => boxes.forEach(b => { b.style.borderColor = ''; b.classList.remove('filled'); b.value = ''; }), 1500);
    boxes[0].focus();
  }
};

// ── Save User to Firestore ──
async function saveUser(user) {
  try {
    const ref  = doc(db, "users", user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        uid:       user.uid,
        name:      user.displayName || "Player",
        email:     user.email || "",
        mobile:    user.phoneNumber || "",
        coins:     1000,
        level:     "Bronze",
        createdAt: serverTimestamp(),
        lastLogin: serverTimestamp()
      });
    } else {
      await updateDoc(ref, { lastLogin: serverTimestamp() });
    }
  } catch (e) {
    console.error("Firestore error:", e);
  }
}

// ── Google Login ──
window._firebaseGoogleLogin = async function() {
  try {
    const provider = new GoogleAuthProvider();
    provider.addScope('email');
    provider.addScope('profile');

    const isGitHubPages = window.location.hostname.includes('github.io');
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    if (isGitHubPages || isMobile) {
      toast('Redirecting to Google...', '');
      await signInWithRedirect(auth, provider);
    } else {
      const result = await signInWithPopup(auth, provider);
      const user   = result.user;
      const name   = user.displayName || "Player";
      await saveUser(user);
      toast('✓ ' + name + ' — Google Login Successful!', 'success');
      setTimeout(() => showSuccess(name), 600);
    }
  } catch (err) {
    console.error("Google login error:", err.code);
    if (err.code === 'auth/popup-closed-by-user') {
      toast('Login cancelled.', '');
    } else if (err.code === 'auth/unauthorized-domain') {
      toast('Domain not authorized. Check Firebase Console.', 'error');
    } else {
      toast('Error: ' + (err.code || err.message), 'error');
    }
  }
};

// ── Redirect Result Handle ──
try {
  const result = await getRedirectResult(auth);
  if (result && result.user) {
    const user = result.user;
    const name = user.displayName || "Player";
    await saveUser(user);
    toast('✓ ' + name + ' — Google Login Successful!', 'success');
    setTimeout(() => showSuccess(name), 600);
  }
} catch (err) {
  if (err.code !== 'auth/no-auth-event') {
    console.error("Redirect error:", err.code);
  }
}

// ── Email/Password Register ──
window._firebaseRegister = async function(name, email, password) {
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
    await saveUser({ ...cred.user, displayName: name });
    closeRegModal();
    toast('✓ Account created! Welcome, ' + name + '!', 'success');
    setTimeout(() => showSuccess(name), 600);
  } catch (err) {
    if (err.code === 'auth/email-already-in-use') {
      toast('This Email is already registered!', 'error');
    } else if (err.code === 'auth/weak-password') {
      toast('Password is too weak. Use at least 6 characters.', 'error');
    } else if (err.code === 'auth/invalid-email') {
      toast('Please enter a valid Email ID.', 'error');
    } else {
      toast('Error: ' + err.code, 'error');
    }
  }
};

// ── User Exists Check ──
window._firebaseCheckUser = async function(identifier) {
  // Phone number साठी check नाही — OTP login always allowed
  const phoneRegex = /^[6-9]\d{9}$/;
  if (phoneRegex.test(identifier)) return true;
  try {
    const methods = await fetchSignInMethodsForEmail(auth, identifier);
    return methods.length > 0;
  } catch (err) {
    return false;
  }
};

// ── Password Login ──
window._firebasePasswordLogin = async function(email, password) {
  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const user = cred.user;
    const name = user.displayName || email.split('@')[0];
    await saveUser(user);
    toast('✓ ' + name + ' — Login Successful!', 'success');
    setTimeout(() => showSuccess(name), 600);
  } catch (err) {
    if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
      toast('❌ User does not exist! Please create a new account.', 'error');
    } else if (err.code === 'auth/wrong-password') {
      toast('❌ Incorrect Password! Please try again.', 'error');
    } else if (err.code === 'auth/too-many-requests') {
      toast('Too many attempts. Please wait a while.', 'error');
    } else {
      toast('Login error: ' + err.code, 'error');
    }
  }
};
</script>
